name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel to publish
        required: true
        default: latest
        type: choice
        options:
          - latest
          - beta
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure release channel
        id: release-config
        env:
          RELEASE_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.channel || 'latest' }}
        run: |
          IS_BETA=false
          PUBLISH_SCRIPT=release:publish
          GITHUB_RELEASE_FLAGS=
          if [ "$RELEASE_CHANNEL" = "beta" ]; then
            IS_BETA=true
            PUBLISH_SCRIPT=release:publish:beta
            GITHUB_RELEASE_FLAGS=--prerelease
          fi
          echo "channel=$RELEASE_CHANNEL" >> "$GITHUB_OUTPUT"
          echo "is_beta=$IS_BETA" >> "$GITHUB_OUTPUT"
          echo "publish_script=$PUBLISH_SCRIPT" >> "$GITHUB_OUTPUT"
          echo "github_release_flags=$GITHUB_RELEASE_FLAGS" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI checks
        run: pnpm run ci

      - name: Prepare beta prerelease version
        if: steps.release-config.outputs.is_beta == 'true'
        run: |
          if [ -f .changeset/pre.json ]; then
            PRE_TAG="$(node -p "require('./.changeset/pre.json').tag")"
            if [ "$PRE_TAG" != "beta" ]; then
              echo "Existing prerelease tag '$PRE_TAG' does not match expected beta"
              exit 1
            fi
          else
            pnpm run version:prerelease:enter:beta
          fi
          pnpm version:release

      - name: Create release pull request or prepare publish
        if: steps.release-config.outputs.is_beta != 'true'
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm version:release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release state
        if: steps.release-config.outputs.is_beta == 'true' || steps.changesets.outputs.hasChangesets == 'false'
        id: release-state
        env:
          IS_BETA: ${{ steps.release-config.outputs.is_beta }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          LAST_PUBLISHED_VERSION=
          if [ "$IS_BETA" = "true" ]; then
            LAST_PUBLISHED_VERSION="$(npm view "$PACKAGE_NAME@beta" version --registry=https://registry.npmjs.org 2>/dev/null || true)"
          else
            LAST_PUBLISHED_VERSION="$(npm view "$PACKAGE_NAME" version --registry=https://registry.npmjs.org 2>/dev/null || true)"
          fi
          SHOULD_PUBLISH=false
          if [ "$PACKAGE_VERSION" != "$LAST_PUBLISHED_VERSION" ]; then
            SHOULD_PUBLISH=true
          fi
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "last_published_version=$LAST_PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          echo "should_publish=$SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"
          echo "Last published version: ${LAST_PUBLISHED_VERSION:-<none>}"

      - name: Extract release notes
        if: (steps.release-config.outputs.is_beta == 'true' || steps.changesets.outputs.hasChangesets == 'false') && steps.release-state.outputs.should_publish == 'true'
        env:
          IS_BETA: ${{ steps.release-config.outputs.is_beta }}
          LAST_PUBLISHED_VERSION: ${{ steps.release-state.outputs.last_published_version }}
        run: |
          if [ "$IS_BETA" = "true" ]; then
            pnpm run release:notes -- "v${{ steps.release-state.outputs.package_version }}" .release-notes.md
          else
            LAST_PUBLISHED_VERSION="$LAST_PUBLISHED_VERSION" pnpm run release:notes -- "v${{ steps.release-state.outputs.package_version }}" .release-notes.md
          fi

      - name: Publish package
        if: (steps.release-config.outputs.is_beta == 'true' || steps.changesets.outputs.hasChangesets == 'false') && steps.release-state.outputs.should_publish == 'true'
        env:
          NPM_CONFIG_PROVENANCE: true
        run: pnpm run ${{ steps.release-config.outputs.publish_script }}

      - name: Create release tag
        if: (steps.release-config.outputs.is_beta == 'true' || steps.changesets.outputs.hasChangesets == 'false') && steps.release-state.outputs.should_publish == 'true'
        env:
          TAG_NAME: v${{ steps.release-state.outputs.package_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Create GitHub release
        if: (steps.release-config.outputs.is_beta == 'true' || steps.changesets.outputs.hasChangesets == 'false') && steps.release-state.outputs.should_publish == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RELEASE_FLAGS: ${{ steps.release-config.outputs.github_release_flags }}
        run: gh release create "v${{ steps.release-state.outputs.package_version }}" --title "v${{ steps.release-state.outputs.package_version }}" --notes-file .release-notes.md --verify-tag $GITHUB_RELEASE_FLAGS
