name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI checks
        run: pnpm run ci

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$TAG_VERSION" = "$PACKAGE_VERSION"

      - name: Resolve last published version
        id: last-published
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          LAST_PUBLISHED_VERSION="$(npm view "$PACKAGE_NAME" version --registry=https://registry.npmjs.org 2>/dev/null || true)"
          echo "last_published_version=$LAST_PUBLISHED_VERSION" >> "$GITHUB_OUTPUT"
          echo "Last published version: ${LAST_PUBLISHED_VERSION:-<none>}"

      - name: Extract release notes
        env:
          LAST_PUBLISHED_VERSION: ${{ steps.last-published.outputs.last_published_version }}
        run: pnpm run release:notes -- "$GITHUB_REF_NAME" .release-notes.md

      - name: Print publish environment
        run: |
          node -v
          npm -v

      - name: Publish package
        run: npm publish --access public --provenance --loglevel verbose

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file .release-notes.md
